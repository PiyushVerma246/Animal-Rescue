<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Register – AniCure</title>
  <meta name="description" content="Sign in or create your AniCure account to report animals, track rescues, and make a difference." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body style="background:radial-gradient(ellipse at 30% 50%, rgba(34,197,94,0.06) 0%, transparent 60%), var(--bg-dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">

<a href="../index.html" class="navbar-brand" style="margin-bottom:2rem">
  <div class="brand-icon">🐾</div>
  Ani<span>Cure</span>
</a>

<div style="width:100%;max-width:440px">
  <!-- Tabs -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.25rem;margin-bottom:1.5rem">
    <button id="tab-login" onclick="switchTab('login')" class="btn" style="border-radius:calc(var(--radius-lg) - 4px);background:linear-gradient(135deg,var(--clr-primary),var(--clr-primary-dark));color:#fff;font-size:0.9rem;justify-content:center">Sign In</button>
    <button id="tab-register" onclick="switchTab('register')" class="btn" style="border-radius:calc(var(--radius-lg) - 4px);background:transparent;color:var(--text-muted);font-size:0.9rem;justify-content:center">Create Account</button>
  </div>

  <!-- Login Form -->
  <div class="card" id="login-panel" style="padding:2rem">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">👋</div>
      <h1 style="font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--text-primary)">Welcome back!</h1>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.25rem">Sign in to your AniCure account</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="login-password" placeholder="Your password" required autocomplete="current-password" style="padding-right:2.5rem" />
          <button type="button" onclick="togglePw('login-password')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:transparent;color:var(--text-muted);font-size:1rem">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="login-btn" style="justify-content:center;margin-top:0.5rem">
        Sign In to AniCure
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <p style="color:var(--text-muted);font-size:0.85rem">Don't have an account? <button onclick="switchTab('register')" style="background:transparent;color:var(--clr-primary);font-weight:600">Create one free</button></p>
    </div>

    <!-- Demo accounts -->
    <div style="margin-top:1.5rem;padding:1rem;background:rgba(34,197,94,0.05);border:1px solid var(--border);border-radius:var(--radius-md);font-size:0.8rem;color:var(--text-muted)">
      <div style="font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem">Demo Accounts</div>
      <div>User: <span style="color:var(--clr-primary)">user@demo.com</span> / demo1234</div>
      <div>NGO: <span style="color:var(--clr-primary)">ngo@demo.com</span> / demo1234</div>
    </div>
  </div>

  <!-- Register Form -->
  <div class="card" id="register-panel" style="padding:2rem;display:none">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🌿</div>
      <h1 style="font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--text-primary)">Join AniCure</h1>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.25rem">Create an account and start saving lives</p>
    </div>
    
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name *</label>
        <input type="text" class="form-control" id="reg-name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address *</label>
        <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-phone">Phone Number</label>
        <input type="tel" class="form-control" id="reg-phone" placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-role">Account Type *</label>
        <select class="form-control" id="reg-role" onchange="toggleOrgFields(this.value)" required>
          <option value="user">👤 Regular User</option>
          <option value="ngo">🏥 NGO / Animal Welfare Org</option>
          <option value="vet">👨‍⚕️ Veterinarian</option>
          <option value="shelter">🏠 Animal Shelter</option>
        </select>
      </div>

      <div id="org-fields" style="display:none">
        <div class="form-group">
          <label class="form-label" for="reg-org-name">Organization Name</label>
          <input type="text" class="form-control" id="reg-org-name" placeholder="e.g., Happy Paws Foundation" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-license">License / Registration Number</label>
          <input type="text" class="form-control" id="reg-license" placeholder="e.g., NGO-2024-XXXX" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password *</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" required minlength="6" style="padding-right:2.5rem" />
          <button type="button" onclick="togglePw('reg-password')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:transparent;color:var(--text-muted);font-size:1rem">👁</button>
        </div>
      </div>

      <!-- Password strength -->
      <div style="display:flex;gap:3px;margin-top:-0.75rem;margin-bottom:1rem" id="strength-bars">
        <div id="pb1" style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:var(--transition)"></div>
        <div id="pb2" style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:var(--transition)"></div>
        <div id="pb3" style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:var(--transition)"></div>
        <div id="pb4" style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:var(--transition)"></div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="register-btn" style="justify-content:center">
        Create Account 🐾
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <p style="color:var(--text-muted);font-size:0.85rem">Already have an account? <button onclick="switchTab('login')" style="background:transparent;color:var(--clr-primary);font-weight:600">Sign in</button></p>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../assets/js/app.js"></script>
<script>
  // Check if already logged in
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    window.location.href = Auth.isNGO() ? 'ngo-dashboard.html' : 'dashboard.html';
  }

  // Check URL param
  if (new URLSearchParams(window.location.search).get('register') === 'true') {
    switchTab('register');
  }

  function switchTab(tab) {
    const loginPanel = document.getElementById('login-panel');
    const registerPanel = document.getElementById('register-panel');
    const tabLogin = document.getElementById('tab-login');
    const tabReg = document.getElementById('tab-register');

    if (tab === 'login') {
      loginPanel.style.display = 'block';
      registerPanel.style.display = 'none';
      tabLogin.style.background = 'linear-gradient(135deg,var(--clr-primary),var(--clr-primary-dark))';
      tabLogin.style.color = '#fff';
      tabReg.style.background = 'transparent';
      tabReg.style.color = 'var(--text-muted)';
    } else {
      loginPanel.style.display = 'none';
      registerPanel.style.display = 'block';
      tabReg.style.background = 'linear-gradient(135deg,var(--clr-primary),var(--clr-primary-dark))';
      tabReg.style.color = '#fff';
      tabLogin.style.background = 'transparent';
      tabLogin.style.color = 'var(--text-muted)';
    }
  }

  function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function toggleOrgFields(role) {
    const orgFields = document.getElementById('org-fields');
    orgFields.style.display = ['ngo', 'vet', 'shelter'].includes(role) ? 'block' : 'none';
  }

  // Password strength
  document.getElementById('reg-password').addEventListener('input', function() {
    const v = this.value;
    const bars = ['pb1','pb2','pb3','pb4'];
    const colors = ['var(--clr-danger)', '#f97316', 'var(--clr-warning)', 'var(--clr-primary)'];
    let strength = 0;
    if (v.length >= 6) strength++;
    if (/[A-Z]/.test(v)) strength++;
    if (/[0-9]/.test(v)) strength++;
    if (/[^a-zA-Z0-9]/.test(v)) strength++;
    
    bars.forEach((id, i) => {
      const el = document.getElementById(id);
      el.style.background = i < strength ? colors[strength - 1] : 'var(--border)';
    });
  });

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    Loading.show(btn, 'Signing in...');

    try {
      // Check stored credentials first
      let user = { name: "User", email, role: 'user', _id: '123' };
      const stored = localStorage.getItem('user_credentials');
      if (stored) {
        const creds = JSON.parse(stored);
        if (creds.email === email && creds.password === password) {
          user = { ...creds, _id: Date.now().toString() };
        }
      }

      Auth.setSession('mock_token_' + Date.now(), user);
      Toast.success(`Welcome back, ${user.name.split(' ')[0]}!`);

      setTimeout(() => {
        window.location.href = ['ngo','vet','shelter','admin'].includes(user.role)
          ? 'ngo-dashboard.html' : 'dashboard.html';
      }, 800);
    } catch (err) {
      Toast.error('Login failed');
      Loading.hide(btn);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const phone = document.getElementById('reg-phone').value;
    const role = document.getElementById('reg-role').value;
    const password = document.getElementById('reg-password').value;
    
    Loading.show(btn, 'Creating account...');

    try {
      // Client-side save to satisfy "store in json format" and make dashboard redirect work
      const user = { name, email, phone, role, _id: Date.now().toString() };
      if (['ngo','vet','shelter'].includes(role)) {
        user.organizationName = document.getElementById('reg-org-name')?.value;
        user.licenseNumber = document.getElementById('reg-license')?.value;
      }

      // Save credentials explicitly in JSON format as asked
      localStorage.setItem('user_credentials', JSON.stringify({ name, email, phone, role, password }));
      
      // Hook into existing app.js session system
      Auth.setSession('mock_token_' + Date.now(), user);
      
      Toast.success('Account created successfully! Welcome to AniCure! 🐾');

      setTimeout(() => {
        window.location.href = ['ngo','vet','shelter','admin'].includes(role)
          ? 'ngo-dashboard.html' : 'dashboard.html';
      }, 1000);
    } catch (err) {
      Toast.error('Registration error layout');
      Loading.hide(btn);
    }
  }
</script>
</body>
</html>
